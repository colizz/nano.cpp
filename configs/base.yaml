# Base analysis configuration for the NanoAODTools.Cpp framework.
#
# This file is the shared default card for every channel/year-specific card in
# `configs/`. Channel cards should use `extends: base.yaml` and only override
# the pieces that are genuinely channel- or campaign-specific.
#
# Override order:
# 1. `base.yaml`
# 2. runtime card such as `run/muon_2024_v15.yaml`
# 3. command-line `--set key=value` options
#
# Supported `--set` syntax uses dot-separated keys. Example:
#   --set selections.muon='nFatJet>0'
#   --set btag.v15.2024.medium=0.13

extends: branches/all.yaml

# Preselection strings applied before constructing the event loop. These are
# ROOT selection expressions and should stay compatible with `TTree::Draw`.
selections:
  muon: Sum$(Muon_pt>55 && abs(Muon_eta)<2.4 && Muon_tightId && Muon_miniPFRelIso_all<0.10)>0 && nFatJet>0

# Output-level optional branches. Keep large vector branches disabled by
# default and enable them in a channel card or with `--set` when needed.
output:
  # Copy the input `LHEScaleWeight` vector into nominal output. This is useful
  # for MC validation or scale-envelope studies. If enabled for data or an input
  # without the branch, the output branch is present and filled with an empty
  # vector.
  include_lhe_weights: false

# Shared JME payload root. Era-specific payload subdirectories are appended to
# this base path.
jec:
  payload_dir: /cvmfs/cms-griddata.cern.ch/cat/metadata/JME

  # Correctionlib JSON used by CMSJMECalculators for JER smearing.
  jer_smear_json: /cvmfs/cms-griddata.cern.ch/cat/metadata/JME/JER-Smearing/latest/jer_smear.json.gz

  # Runtime JME systematic choice. Empty strings mean nominal.
  systematics:
    jes: ""
    jer: "nominal"
    met_unclustered: ""
    smear_met: false

  # JME payload setup keyed by era plus NanoAOD version. `payload_subdir`
  # is the final subdirectory under `payload_dir`; local paths such as
  # `data/jme-derived/...` are resolved relative to the repository root.
  #
  # `inherit` on fatjet/subjet JEC/JER tags means use the corresponding jet tag.
  # `jer_tag_mc: none` means do not apply JER smearing for that object.
  campaigns:
    2016APV_NanoAODv9:
      payload_subdir: Run2-2016preVFP-UL-NanoAODv9
      jet_jerc_file: jet_jerc.json.gz
      fatjet_jerc_file: fatJet_jerc.json.gz
      met_xy_corr_era: ""
      jes_uncertainties: [Total]
      jet:
        algo: AK4PFchs
        jec_tag_mc: Summer19UL16APV_V7_MC
        jec_tag_data: Summer19UL16APV_V7_DATA
        jer_tag_mc: Summer20UL16APV_JRV5_MC
      fatjet:
        algo: AK8PFPuppi
        jec_tag_mc: inherit
        jec_tag_data: inherit
        jer_tag_mc: inherit
      subjet:
        # Derived from legacy JME txt tarballs because official Run2 NanoAODv9
        # correctionlib payloads do not provide AK4PFPuppi subjet JEC.
        payload_subdir: data/jme-derived/Run2-2016preVFP-UL-NanoAODv9/2026-06-25
        jerc_file: jet_jerc.json.gz
        algo: AK4PFPuppi
        jec_tag_mc: inherit
        jec_tag_data: inherit
        jer_tag_mc: inherit
    2016_NanoAODv9:
      payload_subdir: Run2-2016postVFP-UL-NanoAODv9
      jet_jerc_file: jet_jerc.json.gz
      fatjet_jerc_file: fatJet_jerc.json.gz
      met_xy_corr_era: ""
