# Numeric year label written to the output `year` branch. The mapping follows
# the historical Python producer convention, where split eras such as 2022EE
# and 2023BPix use half-step labels.
year_values:
  2016APV: 2015.0
  2016: 2016.0
  2017: 2017.0
  2018: 2018.0
  2022: 2022.0
  2022EE: 2022.5
  2023: 2023.0
  2023BPix: 2023.5
  2024: 2024.0

