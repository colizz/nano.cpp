# Event-level jet veto map. The C++ producer only evaluates this for Run 3
# and later eras; Run 2 outputs a dummy value of -99 by construction. `type`
# is the correctionlib categorical input and `jetvetomap` is the standard
# recommended map. The output branch convention is: 1 means at least one
# selected corrected AK4 jet falls in the veto region, 0 means no such jet, and
# -99 means the map was intentionally not evaluated.
jet_veto_map:
  enabled: true
  payload_dir: /cvmfs/cms-griddata.cern.ch/cat/metadata/JME
  type: jetvetomap
  campaigns:
    2022_NanoAODv12:
      payload_subdir: Run3-22CDSep23-Summer22-NanoAODv12/latest/jetvetomaps.json.gz
      correction: Summer22_23Sep2023_RunCD_V1
    2022EE_NanoAODv12:
      payload_subdir: Run3-22EFGSep23-Summer22EE-NanoAODv12/latest/jetvetomaps.json.gz
      correction: Summer22EE_23Sep2023_RunEFG_V1
    2023_NanoAODv12:
      payload_subdir: Run3-23CSep23-Summer23-NanoAODv12/latest/jetvetomaps.json.gz
      correction: Summer23Prompt23_RunC_V1
    2023BPix_NanoAODv12:
      payload_subdir: Run3-23DSep23-Summer23BPix-NanoAODv12/latest/jetvetomaps.json.gz
      correction: Summer23BPixPrompt23_RunD_V1
    2024_NanoAODv15:
      payload_subdir: Run3-24CDEReprocessingFGHIPrompt-Summer24-NanoAODv15/latest/jetvetomaps.json.gz
      correction: Summer24Prompt24_RunBCDEFGHI_V1

