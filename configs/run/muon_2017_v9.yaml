# Muon channel runtime card for 2017 v9.
# Common NanoAOD branches, stored taggers, and input branch manifests
# are inherited from configs/common/*.yaml.

extends:
  - ../base.yaml
  - ../common/nano_branches_v9.yaml
  - ../common/stored_tagger_names_v9.yaml
  - ../common/read_branches_v9.yaml

era: "2017"
nano_version: "v9"

# ROOT/TTree preselection applied before the event loop.
preselection: Sum$(Muon_pt>55 && abs(Muon_eta)<2.4 && Muon_tightId && Muon_miniPFRelIso_all<0.10)>0 && nFatJet>0

required_triggers:
  - HLT_Mu50
  - HLT_TkMu50
